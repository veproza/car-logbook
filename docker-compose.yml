services:
  car-logbook:
    build:
      context: https://github.com/veproza/car-logbook.git
      network: host
    image: car-logbook
    ports:
      - "3000:3000"
    environment:
      # Override defaults here if needed (PORT, EVAL_INTERVAL_MS, DB_PATH).
      PORT: "3000"
    volumes:
      - /root/car-logbook:/data
    restart: unless-stopped
